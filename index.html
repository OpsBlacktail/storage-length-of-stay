<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storage Facility Length of Stay Analysis | Blacktail Companies</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; color: #e8e4df; font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, ScatterChart, Scatter, ZAxis, Legend } = Recharts;

const COLORS = {
  bg: "#1a1a1a",
  card: "#242424",
  cardHover: "#2a2a2a",
  border: "#333",
  text: "#e8e4df",
  textMuted: "#9a9590",
  accent: "#c9a96e",
  accentLight: "#d4ba85",
  green: "#5a9e6f",
  yellow: "#d4a843",
  red: "#c25b56",
  blue: "#5b8fb9",
  purple: "#8b6fb0",
  bisonNorth: "#5b8fb9",
  bisonCentral: "#c9a96e",
  blackLabel: "#c25b56",
};

const facilities = {
  bisonNorth: {
    name: "Bison North",
    color: COLORS.bisonNorth,
    units: [
      { type: "20x10x8", days: 309, months: 10.2, rentals: 43, sf: 200 },
      { type: "25x10x8", days: 262, months: 8.6, rentals: 38, sf: 250 },
    ],
    total: { days: 287, months: 9.4, rentals: 81 },
  },
  bisonCentral: {
    name: "Bison Central",
    color: COLORS.bisonCentral,
    units: [
      { type: "5x10", days: 188, months: 6.2, rentals: 87, sf: 50 },
      { type: "10x10", days: 338, months: 11.1, rentals: 67, sf: 100 },
      { type: "10x20", days: 293, months: 9.6, rentals: 49, sf: 200 },
      { type: "10x30", days: 182, months: 6.0, rentals: 10, sf: 300 },
    ],
    total: { days: 259, months: 8.5, rentals: 213 },
  },
  blackLabel: {
    name: "Black Label",
    color: COLORS.blackLabel,
    units: [
      { type: "14x30", days: 170, months: 5.6, rentals: 28, sf: 420 },
      { type: "12x40", days: 133, months: 4.4, rentals: 4, sf: 480 },
      { type: "17x30", days: 188, months: 6.2, rentals: 16, sf: 510 },
      { type: "14x40", days: 110, months: 3.6, rentals: 22, sf: 560 },
      { type: "14x50", days: 93, months: 3.1, rentals: 20, sf: 700 },
      { type: "17x50", days: 128, months: 4.2, rentals: 9, sf: 850 },
    ],
    total: { days: 139, months: 4.6, rentals: 99 },
  },
};

const portfolioTotal = {
  rentals: 81 + 213 + 99,
  weightedDays: Math.round((287 * 81 + 259 * 213 + 139 * 99) / (81 + 213 + 99)),
  weightedMonths: ((287 * 81 + 259 * 213 + 139 * 99) / (81 + 213 + 99) / 30.44).toFixed(1),
};

const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 6, padding: "10px 14px", fontSize: 13 }}>
      <div style={{ color: COLORS.text, fontWeight: 600, marginBottom: 4 }}>{label}</div>
      {payload.map((p, i) => (
        <div key={i} style={{ color: p.color || COLORS.textMuted, marginTop: 2 }}>
          {p.name}: <span style={{ color: COLORS.text, fontWeight: 500 }}>{p.value}{p.name.includes("Month") ? " mo" : p.name.includes("Day") ? " days" : ""}</span>
        </div>
      ))}
    </div>
  );
};

const ScatterTooltip = ({ active, payload }) => {
  if (!active || !payload?.length) return null;
  const d = payload[0].payload;
  return (
    <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 6, padding: "10px 14px", fontSize: 13 }}>
      <div style={{ color: COLORS.text, fontWeight: 600, marginBottom: 4 }}>{d.label}</div>
      <div style={{ color: COLORS.textMuted }}>Unit SF: <span style={{ color: COLORS.text }}>{d.x} SF</span></div>
      <div style={{ color: COLORS.textMuted }}>Avg Stay: <span style={{ color: COLORS.text }}>{d.y} months</span></div>
      <div style={{ color: COLORS.textMuted }}>Rentals: <span style={{ color: COLORS.text }}>{d.z}</span></div>
    </div>
  );
};

const MetricCard = ({ label, value, sub, color }) => (
  <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "16px 20px", flex: 1, minWidth: 160 }}>
    <div style={{ fontSize: 12, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>{label}</div>
    <div style={{ fontSize: 28, fontWeight: 700, color: color || COLORS.accent, lineHeight: 1.1 }}>{value}</div>
    {sub && <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 4 }}>{sub}</div>}
  </div>
);

const FacilityRow = ({ facility }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: `1px solid ${COLORS.border}` }}>
    <div style={{ width: 10, height: 10, borderRadius: "50%", background: facility.color, flexShrink: 0 }} />
    <div style={{ flex: 1, fontWeight: 500, color: COLORS.text }}>{facility.name}</div>
    <div style={{ width: 80, textAlign: "right", color: COLORS.text, fontWeight: 600 }}>{facility.total.months} mo</div>
    <div style={{ width: 80, textAlign: "right", color: COLORS.textMuted }}>{facility.total.days} days</div>
    <div style={{ width: 80, textAlign: "right", color: COLORS.textMuted }}>{facility.total.rentals} rentals</div>
  </div>
);

function StorageAnalysis() {
  const [activeTab, setActiveTab] = useState("overview");

  const comparisonData = Object.values(facilities).map(f => ({
    name: f.name,
    months: f.total.months,
    days: f.total.days,
    rentals: f.total.rentals,
    color: f.color,
  }));

  const allUnitsData = Object.entries(facilities).flatMap(([key, f]) =>
    f.units.map(u => ({
      facility: f.name,
      type: u.type,
      label: `${f.name} — ${u.type}`,
      x: u.sf,
      y: u.months,
      z: u.rentals,
      color: f.color,
    }))
  );

  const unitBreakdownData = Object.entries(facilities).flatMap(([key, f]) =>
    f.units.map(u => ({
      name: `${u.type}`,
      facility: f.name,
      months: u.months,
      days: u.days,
      rentals: u.rentals,
      color: f.color,
    }))
  );

  const turnoverData = Object.values(facilities).map(f => ({
    name: f.name,
    turnsPerYear: parseFloat((365 / f.total.days).toFixed(2)),
    color: f.color,
  }));

  const tabs = [
    { id: "overview", label: "Overview" },
    { id: "units", label: "Unit Breakdown" },
    { id: "correlation", label: "Size vs. Stay" },
    { id: "insights", label: "Key Insights" },
  ];

  return (
    <div style={{ fontFamily: "'Segoe UI', 'Helvetica Neue', sans-serif", background: COLORS.bg, color: COLORS.text, minHeight: "100vh", padding: "24px 28px" }}>
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 2, color: COLORS.textMuted, marginBottom: 4 }}>Blacktail Companies</div>
        <h1 style={{ fontSize: 26, fontWeight: 700, margin: 0, color: COLORS.text }}>Storage Facility Length of Stay Analysis</h1>
        <div style={{ fontSize: 13, color: COLORS.textMuted, marginTop: 4 }}>Report generated 2026-02-17 across 3 facilities, {portfolioTotal.rentals} total past rentals</div>
      </div>

      <div style={{ display: "flex", gap: 2, marginBottom: 24, borderBottom: `1px solid ${COLORS.border}`, paddingBottom: 0 }}>
        {tabs.map(t => (
          <button
            key={t.id}
            onClick={() => setActiveTab(t.id)}
            style={{
              background: "none", border: "none", cursor: "pointer",
              padding: "8px 16px", fontSize: 13, fontWeight: 500,
              color: activeTab === t.id ? COLORS.accent : COLORS.textMuted,
              borderBottom: activeTab === t.id ? `2px solid ${COLORS.accent}` : "2px solid transparent",
              transition: "all 0.2s",
              marginBottom: -1,
            }}
          >{t.label}</button>
        ))}
      </div>

      {activeTab === "overview" && (
        <div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 24 }}>
            <MetricCard label="Portfolio Avg Stay" value={`${portfolioTotal.weightedMonths} mo`} sub={`${portfolioTotal.weightedDays} days weighted avg`} />
            <MetricCard label="Total Past Rentals" value={portfolioTotal.rentals} sub="Across all 3 facilities" color={COLORS.text} />
            <MetricCard label="Longest Avg Stay" value="11.1 mo" sub="Bison Central — 10x10" color={COLORS.green} />
            <MetricCard label="Shortest Avg Stay" value="3.1 mo" sub="Black Label — 14x50" color={COLORS.red} />
          </div>

          <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
            <div style={{ flex: 2, minWidth: 320, background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 20 }}>
              <h3 style={{ margin: "0 0 16px", fontSize: 14, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5 }}>Average Length of Stay by Facility</h3>
              <ResponsiveContainer width="100%" height={220}>
                <BarChart data={comparisonData} barSize={48}>
                  <CartesianGrid strokeDasharray="3 3" stroke={COLORS.border} />
                  <XAxis dataKey="name" tick={{ fill: COLORS.textMuted, fontSize: 12 }} axisLine={{ stroke: COLORS.border }} />
                  <YAxis tick={{ fill: COLORS.textMuted, fontSize: 12 }} axisLine={{ stroke: COLORS.border }} label={{ value: "Months", angle: -90, position: "insideLeft", fill: COLORS.textMuted, fontSize: 11 }} />
                  <Tooltip content={<CustomTooltip />} />
                  <Bar dataKey="months" name="Months" radius={[4, 4, 0, 0]}>
                    {comparisonData.map((d, i) => <Cell key={i} fill={d.color} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>

            <div style={{ flex: 1, minWidth: 280, background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 20 }}>
              <h3 style={{ margin: "0 0 12px", fontSize: 14, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5 }}>Facility Summary</h3>
              <div style={{ display: "flex", fontSize: 11, color: COLORS.textMuted, padding: "0 0 8px", borderBottom: `1px solid ${COLORS.border}`, marginBottom: 4 }}>
                <div style={{ flex: 1 }}>Facility</div>
                <div style={{ width: 80, textAlign: "right" }}>Avg Stay</div>
                <div style={{ width: 80, textAlign: "right" }}>Days</div>
                <div style={{ width: 80, textAlign: "right" }}>Rentals</div>
              </div>
              {Object.values(facilities).map((f, i) => <FacilityRow key={i} facility={f} />)}
              <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0 0", marginTop: 4 }}>
                <div style={{ width: 10 }} />
                <div style={{ flex: 1, fontWeight: 600, color: COLORS.accent }}>Portfolio Weighted</div>
                <div style={{ width: 80, textAlign: "right", color: COLORS.accent, fontWeight: 700 }}>{portfolioTotal.weightedMonths} mo</div>
                <div style={{ width: 80, textAlign: "right", color: COLORS.textMuted }}>{portfolioTotal.weightedDays} days</div>
                <div style={{ width: 80, textAlign: "right", color: COLORS.textMuted }}>{portfolioTotal.rentals}</div>
              </div>
            </div>
          </div>

          <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 20, marginTop: 16 }}>
            <h3 style={{ margin: "0 0 16px", fontSize: 14, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5 }}>Implied Annual Turnover Rate</h3>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={turnoverData} barSize={48} layout="vertical">
                <CartesianGrid strokeDasharray="3 3" stroke={COLORS.border} horizontal={false} />
                <XAxis type="number" tick={{ fill: COLORS.textMuted, fontSize: 12 }} axisLine={{ stroke: COLORS.border }} label={{ value: "Turns per Year", position: "insideBottom", fill: COLORS.textMuted, fontSize: 11, offset: -2 }} />
                <YAxis type="category" dataKey="name" tick={{ fill: COLORS.textMuted, fontSize: 12 }} axisLine={{ stroke: COLORS.border }} width={100} />
                <Tooltip content={<CustomTooltip />} />
                <Bar dataKey="turnsPerYear" name="Turns/Year" radius={[0, 4, 4, 0]}>
                  {turnoverData.map((d, i) => <Cell key={i} fill={d.color} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      )}

      {activeTab === "units" && (
        <div>
          {Object.entries(facilities).map(([key, f]) => (
            <div key={key} style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 20, marginBottom: 16 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                <div style={{ width: 12, height: 12, borderRadius: "50%", background: f.color }} />
                <h3 style={{ margin: 0, fontSize: 16, fontWeight: 600 }}>{f.name}</h3>
                <span style={{ fontSize: 12, color: COLORS.textMuted, marginLeft: 8 }}>Facility Avg: {f.total.months} mo | {f.total.rentals} total rentals</span>
              </div>
              <ResponsiveContainer width="100%" height={Math.max(160, f.units.length * 44 + 40)}>
                <BarChart data={f.units} barSize={28} layout="vertical">
                  <CartesianGrid strokeDasharray="3 3" stroke={COLORS.border} horizontal={false} />
                  <XAxis type="number" tick={{ fill: COLORS.textMuted, fontSize: 12 }} axisLine={{ stroke: COLORS.border }} domain={[0, 12]} label={{ value: "Avg Stay (Months)", position: "insideBottom", fill: COLORS.textMuted, fontSize: 11, offset: -2 }} />
                  <YAxis type="category" dataKey="type" tick={{ fill: COLORS.text, fontSize: 12 }} axisLine={{ stroke: COLORS.border }} width={80} />
                  <Tooltip content={<CustomTooltip />} />
                  <Bar dataKey="months" name="Months" radius={[0, 4, 4, 0]} fill={f.color}>
                    {f.units.map((u, i) => <Cell key={i} fill={f.color} opacity={0.6 + (u.months / 12) * 0.4} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
              <div style={{ marginTop: 12, fontSize: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 80px 80px 80px 80px", gap: 4, padding: "6px 8px", color: COLORS.textMuted, borderBottom: `1px solid ${COLORS.border}` }}>
                  <div>Unit Type</div>
                  <div style={{ textAlign: "right" }}>SF</div>
                  <div style={{ textAlign: "right" }}>Avg Days</div>
                  <div style={{ textAlign: "right" }}>Avg Months</div>
                  <div style={{ textAlign: "right" }}>Rentals</div>
                </div>
                {f.units.map((u, i) => (
                  <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 80px 80px 80px 80px", gap: 4, padding: "6px 8px", borderBottom: `1px solid ${COLORS.border}22` }}>
                    <div style={{ fontWeight: 500 }}>{u.type}</div>
                    <div style={{ textAlign: "right", color: COLORS.textMuted }}>{u.sf}</div>
                    <div style={{ textAlign: "right" }}>{u.days}</div>
                    <div style={{ textAlign: "right", fontWeight: 600, color: f.color }}>{u.months}</div>
                    <div style={{ textAlign: "right", color: COLORS.textMuted }}>{u.rentals}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {activeTab === "correlation" && (
        <div>
          <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 20, marginBottom: 16 }}>
            <h3 style={{ margin: "0 0 4px", fontSize: 16, fontWeight: 600 }}>Unit Size vs. Average Length of Stay</h3>
            <p style={{ margin: "0 0 16px", fontSize: 12, color: COLORS.textMuted }}>Bubble size = number of past rentals. Hover for detail.</p>
            <ResponsiveContainer width="100%" height={360}>
              <ScatterChart margin={{ top: 10, right: 20, bottom: 20, left: 10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke={COLORS.border} />
                <XAxis type="number" dataKey="x" name="Unit SF" tick={{ fill: COLORS.textMuted, fontSize: 12 }} axisLine={{ stroke: COLORS.border }} label={{ value: "Unit Size (SF)", position: "insideBottom", offset: -8, fill: COLORS.textMuted, fontSize: 11 }} />
                <YAxis type="number" dataKey="y" name="Avg Months" tick={{ fill: COLORS.textMuted, fontSize: 12 }} axisLine={{ stroke: COLORS.border }} label={{ value: "Avg Stay (Months)", angle: -90, position: "insideLeft", fill: COLORS.textMuted, fontSize: 11 }} domain={[0, 12]} />
                <ZAxis type="number" dataKey="z" range={[80, 500]} />
                <Tooltip content={<ScatterTooltip />} />
                <Legend verticalAlign="top" height={36} wrapperStyle={{ fontSize: 12 }} />
                <Scatter name="Bison North" data={allUnitsData.filter(d => d.facility === "Bison North")} fill={COLORS.bisonNorth} fillOpacity={0.8} />
                <Scatter name="Bison Central" data={allUnitsData.filter(d => d.facility === "Bison Central")} fill={COLORS.bisonCentral} fillOpacity={0.8} />
                <Scatter name="Black Label" data={allUnitsData.filter(d => d.facility === "Black Label")} fill={COLORS.blackLabel} fillOpacity={0.8} />
              </ScatterChart>
            </ResponsiveContainer>
          </div>

          <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 20 }}>
            <h3 style={{ margin: "0 0 12px", fontSize: 14, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5 }}>All Units Ranked by Avg Stay</h3>
            <ResponsiveContainer width="100%" height={480}>
              <BarChart
                data={[...unitBreakdownData].sort((a, b) => b.months - a.months)}
                barSize={20}
                layout="vertical"
              >
                <CartesianGrid strokeDasharray="3 3" stroke={COLORS.border} horizontal={false} />
                <XAxis type="number" tick={{ fill: COLORS.textMuted, fontSize: 11 }} axisLine={{ stroke: COLORS.border }} domain={[0, 12]} />
                <YAxis type="category" dataKey="name" tick={{ fill: COLORS.text, fontSize: 11 }} axisLine={{ stroke: COLORS.border }} width={65} />
                <Tooltip content={<CustomTooltip />} />
                <Bar dataKey="months" name="Months" radius={[0, 4, 4, 0]}>
                  {[...unitBreakdownData].sort((a, b) => b.months - a.months).map((d, i) => (
                    <Cell key={i} fill={d.color} />
                  ))}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      )}

      {activeTab === "insights" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 24 }}>
            <h3 style={{ margin: "0 0 16px", fontSize: 16, fontWeight: 600, color: COLORS.accent }}>Portfolio-Level Findings</h3>

            <div style={{ marginBottom: 20 }}>
              <h4 style={{ margin: "0 0 8px", fontSize: 14, fontWeight: 600, color: COLORS.text }}>1. Black Label Has 2x the Turnover of Traditional Storage</h4>
              <p style={{ margin: 0, fontSize: 13, color: COLORS.textMuted, lineHeight: 1.6 }}>
                Black Label's 4.6-month average stay translates to ~2.63 unit turns per year, compared to ~1.27 at Bison North and ~1.41 at Bison Central. This means significantly higher turnover costs (cleaning, re-leasing, vacancy days) but also more frequent re-pricing opportunities. If market rates are rising, Black Label captures upside faster. If rates soften, exposure is higher.
              </p>
            </div>

            <div style={{ marginBottom: 20 }}>
              <h4 style={{ margin: "0 0 8px", fontSize: 14, fontWeight: 600, color: COLORS.text }}>2. Mid-Size Units Are the Retention Sweet Spot</h4>
              <p style={{ margin: 0, fontSize: 13, color: COLORS.textMuted, lineHeight: 1.6 }}>
                Across the portfolio, the 100-250 SF range (10x10, 10x20, 20x10) consistently delivers the longest stays: 9.6 to 11.1 months. These units likely serve tenants with stable, ongoing storage needs (business inventory, household overflow). Both the smallest units (5x10 at 6.2 months) and the largest garage condos (14x50 at 3.1 months) turn faster, suggesting more transient or project-based use cases.
              </p>
            </div>

            <div style={{ marginBottom: 20 }}>
              <h4 style={{ margin: "0 0 8px", fontSize: 14, fontWeight: 600, color: COLORS.text }}>3. Bison Central Drives Volume, Bison North Drives Retention</h4>
              <p style={{ margin: 0, fontSize: 13, color: COLORS.textMuted, lineHeight: 1.6 }}>
                Bison Central accounts for 54% of all past rentals (213 of 393) and offers the widest unit mix. Bison North, despite having only 2 unit types and 81 rentals, achieves the highest facility average stay at 9.4 months. This suggests Bison North's larger units attract a stickier tenant base.
              </p>
            </div>

            <div>
              <h4 style={{ margin: "0 0 8px", fontSize: 14, fontWeight: 600, color: COLORS.text }}>4. Black Label Garage Condos Behave Differently Than Traditional Storage</h4>
              <p style={{ margin: 0, fontSize: 13, color: COLORS.textMuted, lineHeight: 1.6 }}>
                The garage condo product at Black Label shows a clear inverse relationship between unit size and length of stay. The largest units (14x50, 17x50) have the shortest stays (3.1 and 4.2 months), likely because tenants use them for short-term vehicle or equipment staging, not long-term storage. This is a fundamentally different demand pattern than Bison's traditional self-storage.
              </p>
            </div>
          </div>

          <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 24 }}>
            <h3 style={{ margin: "0 0 16px", fontSize: 16, fontWeight: 600, color: COLORS.accent }}>Operational Implications</h3>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <div style={{ background: COLORS.bg, borderRadius: 8, padding: 16 }}>
                <div style={{ fontSize: 12, color: COLORS.green, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Revenue Optimization</div>
                <ul style={{ margin: 0, paddingLeft: 18, fontSize: 13, color: COLORS.textMuted, lineHeight: 1.8 }}>
                  <li>Black Label should lean into shorter commitment terms with premium pricing, given natural turnover</li>
                  <li>Bison facilities can justify longer-term lease incentives (6-month or 12-month discounts) since tenants naturally stay 8-10 months anyway</li>
                  <li>Annual rate increases at Bison capture more value per tenant given longer retention</li>
                </ul>
              </div>

              <div style={{ background: COLORS.bg, borderRadius: 8, padding: 16 }}>
                <div style={{ fontSize: 12, color: COLORS.yellow, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Marketing Strategy</div>
                <ul style={{ margin: 0, paddingLeft: 18, fontSize: 13, color: COLORS.textMuted, lineHeight: 1.8 }}>
                  <li>Black Label needs a larger top-of-funnel pipeline to compensate for higher turnover</li>
                  <li>Bison Central 5x10 and 10x30 units churn faster (6.0-6.2 months). Evaluate whether pricing or positioning adjustments could improve retention</li>

              The Bison facilities operate like traditional self-storage with 8-10 month average retention and stable tenant bases. Black Label operates more like a short-term rental product with sub-5-month stays and high turnover. These two product types require different pricing strategies, marketing budgets, and operational workflows. Managing them with the same playbook leaves value on the table.
